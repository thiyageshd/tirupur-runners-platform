name: Deploy to Bluehost VPS (Dev)

on:
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy-bluehost-dev.yml"

jobs:
  deploy:
    name: Deploy dev → Bluehost VPS
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BLUEHOST_HOST }}
          username: ${{ secrets.BLUEHOST_USER }}
          key: ${{ secrets.BLUEHOST_SSH_KEY }}
          port: 22
          source: "frontend/dist"
          target: "/var/www/tirupur-runners-platform/frontend/"
          strip_components: 1

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BLUEHOST_HOST }}
          username: ${{ secrets.BLUEHOST_USER }}
          key: ${{ secrets.BLUEHOST_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e
            cd /var/www/tirupur-runners-platform
            git fetch origin
            git reset --hard origin/dev

            cat > /var/www/tirupur-runners-platform/backend/.env << 'EOF'
            DATABASE_URL=${{ secrets.BLUEHOST_DATABASE_URL }}
            SECRET_KEY=${{ secrets.BLUEHOST_SECRET_KEY }}
            RAZORPAY_KEY_ID=${{ secrets.BLUEHOST_RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.BLUEHOST_RAZORPAY_KEY_SECRET }}
            RAZORPAY_WEBHOOK_SECRET=${{ secrets.BLUEHOST_RAZORPAY_WEBHOOK_SECRET }}
            GMAIL_USER=${{ secrets.BLUEHOST_GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.BLUEHOST_GMAIL_APP_PASSWORD }}
            FRONTEND_URL=https://dev.tirupurrunners.com
            DEBUG=False
            EOF

            cd backend
            .venv/bin/pip install -r requirements.txt --quiet

            systemctl restart tirupur-runners
            systemctl is-active tirupur-runners
            echo "✓ Dev deploy complete"
