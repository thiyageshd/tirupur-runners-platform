## Render Blueprint — PRODUCTION
## Linked to: main branch (auto-deployed on push)
## Docs: https://render.com/docs/blueprint-spec
##
## HOW TO USE:
##   1. Create a Render PostgreSQL instance (Singapore region, name: tirupur-runners-db)
##   2. Run migration:  python scripts/migrate_dev_to_prod.py --target <external-db-url>
##   3. Connect this repo → New Blueprint → select render.yaml
##   4. Set the sync:false env vars manually in Render dashboard after deploy

services:
  # ─── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: tirupur-runners-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        value: "postgresql+asyncpg://tirupur_runners_user:Havsfdt0oZp0S7chCRJEQSAgplBFntPI@dpg-d74bn8oule4c73evi4e0-a.singapore-postgres.render.com/tirupur_runners_dev?ssl=require"
        generateValue: true              # Auto-generated by Render
      - key: RAZORPAY_KEY_ID
        value: rzp_test_SWZaFHz5JV0xYQ
      - key: RAZORPAY_KEY_SECRET
        value: kQDQE8uOUek1C21UPlr77tWh
      - key: RAZORPAY_WEBHOOK_SECRET
        value: kQDQE8uOUek1C21UPlr77tWh
      - key: FROM_EMAIL
        value: "noreply@tirupurrunners.com"
      - key: MEMBERSHIP_AMOUNT_PAISE
        value: "200000"                  # ₹2,000 — new member fee
      - key: RENEWAL_AMOUNT_PAISE
        value: "150000"                  # ₹1,500 — renewal fee
      - key: DEBUG
        value: "False"
      - key: ADMIN_EMAIL
        value: "tirupurrunners@gmail.com"
      - key: FRONTEND_URL
        value: "https://tirupur-runners-web.onrender.com"

  # ─── Frontend: React + Vite (Static Site) ─────────────────────────────────
  - type: web
    name: tirupur-runners-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://tirupur-runners-api.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
