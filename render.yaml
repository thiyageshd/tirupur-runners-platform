## Render Blueprint — PRODUCTION
## Linked to: main branch
## Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: tirupur-runners-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false                      # Set in Render dashboard (Neon.tech)
      - key: SECRET_KEY
        generateValue: true              # Auto-generated by Render
      - key: RAZORPAY_KEY_ID
        sync: false                      # Set in Render dashboard (live key)
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: MEMBERSHIP_AMOUNT_PAISE
        value: "200000"                  # ₹2000 new member
      - key: DEBUG
        value: "False"
      - key: ADMIN_EMAIL
        value: "admin@tirupurrunners.com"
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: "noreply@tirupurrunners.com"
      - key: FRONTEND_URL
        value: "https://tirupur-runners-web.onrender.com"

  # ─── Frontend: React + Vite (Static Site) ─────────────────────────────────
  - type: web
    name: tirupur-runners-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://tirupur-runners-api.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
